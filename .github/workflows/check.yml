name: check

on:
  push:
    branches:
      - '**'
    tags:
      - '**'
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
          cache: true

      - name: download dependencies
        run: go mod download

      - name: run linter
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.9

      - name: run tests with race detector
        run: make test-race