services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.local
    volumes:
    - .:/app
    - gomod:/go/pkg/mod
    ports:
      - "${APP_PORT:-8086}:${PORT:-8080}"
    restart: "unless-stopped"
    env_file:
      - ".env"
    depends_on:
      postgres:
        condition: service_healthy
  postgres:
    image: postgres:18.4-alpine3.23
    volumes:
      - pgdata:/var/lib/postgresql
    environment:
      POSTGRES_USER: "${PG_USER:-postgres}"
      POSTGRES_PASSWORD: "${PG_PASSWORD:-postgres}"
      POSTGRES_DB: "${PG_DB_NAME:-app}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-postgres} -d ${PG_DB_NAME:-app}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  gomod:
  pgdata: